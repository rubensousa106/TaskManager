spring.application.name=backend
server.port=8080

# JWT configuration
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://zvxzhkrrjbaefjiqgddk.supabase.co/auth/v1/.well-known/jwks.json


# Database configuration for Supabase
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.config.import=optional:file:.env[.properties]


#  HikariCP settings
spring.datasource.hikari.minimum-idle=1
  #  Minimum number of idle connections in the pool
spring.datasource.hikari.maximum-pool-size=5
  # Maximum number of connections in the pool
spring.datasource.hikari.idle-timeout=300000
  # Maximum time that a connection can be idle before being removed from the pool in milliseconds
spring.datasource.hikari.max-lifetime=900000
  #  Maximum lifetime of a connection in the pool before it is closed and removed in milliseconds
spring.datasource.hikari.connection-timeout=30000
 # Maximum time to wait for a connection from the pool before throwing an exception in milliseconds


